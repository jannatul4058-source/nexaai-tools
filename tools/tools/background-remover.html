<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>AI Background Remover - NexaAI Tools</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

color:#111827;
}


header{
background:linear-gradient(135deg,#2563eb,#7c3aed);

}


.container{
max-width:900px;
margin:50px auto;

}

font-size:18px;
color:#64748b;

}

padding:35px;

box-shadow:0 10px 25px rgba(0,0,0,.1);

.upload-area{

border:2px dashed #2563eb;
padding:40px;

input[type="file"]{

.preview{

margin-top:30px;
height:200px;

background:#e5e7eb;
display:flex;
align-items:center;

footer{

</p>

Preview Area

</div>


</div>



</div>
