<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Video Subtitle Generator - NexaAI Tools</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f8fafc;
color:#111827;
}


header{
background:linear-gradient(135deg,#2563eb,#ec4899);
color:white;
padding:25px;
text-align:center;
}


.container{
max-width:900px;
margin:50px auto;
padding:20px;
text-align:center;
}


h1{
font-size:42px;
margin-bottom:15px;
}


p{
font-size:18px;
color:#64748b;
margin-bottom:30px;
}


.box{

background:white;
padding:35px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.1);

}


.upload{

border:2px dashed #2563eb;
padding:40px;
border-radius:15px;

}


input[type="file"]{

margin-top:20px;

}


select{

width:90%;
padding:15px;
margin-top:20px;
border-radius:10px;
border:1px solid #ddd;

}


button{

margin-top:25px;
padding:14px 35px;
border:none;
border-radius:30px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;

}


.result{

margin-top:30px;
padding:25px;
background:#f1f5f9;
border-radius:15px;

}


footer{

margin-top:60px;
background:#111827;
color:white;
padding:20px;
text-align:center;

}

</style>

</head>


<body>


<header>

<h2>NexaAI Tools</h2>

</header>



<div class="container">


<h1>🎬 AI Video Subtitle Generator</h1>


<p>
Automatically generate subtitles for your videos using AI.
</p>



<div class="box">


<div class="upload">

<h3>Upload Video</h3>

<input type="file" accept="video/*">

</div>



<select>

<option>Select Language</option>

<option>English</option>

<option>Bangla</option>

<option>Hindi</option>

</select>



<br>


<button>
Generate Subtitle
</button>



<div class="result">

Subtitle Preview Area

</div>


</div>


</div>



<footer>

© 2026 NexaAI Tools. All Rights Reserved.

</footer>


</body>

</html>
