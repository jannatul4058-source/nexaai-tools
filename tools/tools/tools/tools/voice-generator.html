<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Voice Generator - NexaAI Tools</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f8fafc;
color:#111827;
}


header{
background:linear-gradient(135deg,#2563eb,#06b6d4);
color:white;
padding:25px;
text-align:center;
}


.container{
max-width:900px;
margin:50px auto;
padding:20px;
text-align:center;
}


h1{
font-size:42px;
margin-bottom:15px;
}


p{
font-size:18px;
color:#64748b;
margin-bottom:30px;
}


.box{

background:white;
padding:35px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.1);

}


textarea{

width:90%;
height:130px;
padding:15px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;

}


select{

width:90%;
padding:15px;
margin-top:15px;
border-radius:10px;
border:1px solid #ddd;

}


button{

margin-top:25px;
padding:14px 35px;
border:none;
border-radius:30px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;

}


.audio-box{

margin-top:30px;
padding:20px;
background:#f1f5f9;
border-radius:15px;

}


footer{

margin-top:60px;
background:#111827;
color:white;
padding:20px;
text-align:center;

}

</style>

</head>


<body>


<header>

<h2>NexaAI Tools</h2>

</header>



<div class="container">


<h1>🎤 AI Voice Generator</h1>


<p>
Convert text into realistic AI voice.
</p>



<div class="box">


<h3>Enter Your Text</h3>


<textarea placeholder="Write your text here..."></textarea>



<select>

<option>English Voice</option>

<option>Bangla Voice</option>

<option>Male Voice</option>

<option>Female Voice</option>

</select>



<br>


<button>
Generate Voice
</button>



<div class="audio-box">

Audio Preview Area

</div>


</div>


</div>




<footer>

</footer>

</html>
